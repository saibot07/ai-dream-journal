name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: [3.8, 3.9, 3.10]
        node-version: [16, 18]

    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi

    - name: Install Node.js dependencies
      run: |
        if [ -f "package.json" ]; then npm install; fi

    - name: Run Python tests
      run: |
        if [ -f "requirements.txt" ]; then pytest || echo 'Python tests failed.'; fi

    - name: Run Node.js tests or lint
      run: |
        if [ -f "package.json" ]; then npm test || echo 'Node.js tests failed.'; fi

    - name: Lint with flake8
      run: |
        if [ -f "requirements.txt" ]; then pip install flake8; flake8 || echo 'Linting failed.'; fi